name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build HTML site
        id: build
        continue-on-error: true
        run: |
          python -m sphinx -b html docs docs/_build &> sphinx_log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Debug build output
        if: always()
        run: |
          echo "Build exit code: ${{ steps.build.outputs.exit_code }}"
          echo "::group::Sphinx build log"
          cat sphinx_log.txt || echo "no log file"
          echo "::endgroup::"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-log
          path: sphinx_log.txt

      - name: Fail if build failed
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "Sphinx build failed with exit code ${{ steps.build.outputs.exit_code }}"
          exit ${{ steps.build.outputs.exit_code }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
