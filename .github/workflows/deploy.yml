name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnose environment
        run: |
          echo "## System" >> $GITHUB_STEP_SUMMARY
          echo "- Python: $(python --version 2>&1)" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: $(python -c 'import platform; print(platform.platform())')" >> $GITHUB_STEP_SUMMARY
          echo "## Installed packages" >> $GITHUB_STEP_SUMMARY
          pip list --format=columns >> $GITHUB_STEP_SUMMARY

      - name: Build HTML site
        id: build
        run: |
          EXIT_CODE=0
          python -m sphinx -b html -vvv docs docs/_build 2>&1 | tee sphinx_log.txt || EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-log
          path: sphinx_log.txt

      - name: Upload artifact
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
