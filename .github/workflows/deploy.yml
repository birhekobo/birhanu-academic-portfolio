name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-dev libffi-dev shared-mime-info
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build HTML site
        run: sphinx-build -b html docs docs/_build

      - name: Generate PDF CV
        run: |
          python -c "
          from weasyprint import HTML
          import os
          cv_path = 'docs/_build/cv/index.html'
          if os.path.exists(cv_path):
              HTML(filename=cv_path).write_pdf('docs/_build/cv.pdf')
              print('PDF CV generated successfully')
          else:
              print(f'CV not found at {cv_path}, skipping PDF generation')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
